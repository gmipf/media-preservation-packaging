issue_repository: https://github.com/gmipf/packaging-media-preservation

srpm_build_deps:
  - rpm-build
  - rpmdevtools

# Multi-package layout — each tool gets its own block under packages:.
# When `paths:` is set, `specfile_path` and action-internal paths are
# relative to that path (Packit joins them: paths + specfile_path).
# create-archive overrides are needed because this repo holds only
# packaging recipes (no upstream source); default `git archive HEAD`
# would only archive the spec. We use spectool to fetch Source0 instead.
packages:
  redumper:
    paths:
      - fedora/redumper/
    specfile_path: redumper.spec
    upstream_project_url: https://github.com/superg/redumper
    upstream_tag_template: "b{version}"
    # Repackage of upstream prebuilt linux-x64 ZIP (since Phase 6).
    # spectool also fetches LICENSE + README via raw.githubusercontent.
    # create-archive returns the linux-x64.zip as the primary archive;
    # SRPM packs all three Source* URLs.
    actions:
      get-current-version:
        - bash -c "rpmspec -q --queryformat '%{version}\n' redumper.spec | head -1"
      create-archive:
        - bash -c "spectool -g redumper.spec 1>&2"
        - bash -c "ls -1 redumper-b*-linux-x64.zip | head -1"

  mpf:
    paths:
      - fedora/mpf/
    specfile_path: mpf.spec
    upstream_project_url: https://github.com/SabreTools/MPF
    # No get-current-version action — watch-mpf-rolling.yml rewrites the
    # `%global mpfver` and `%global mpfsnap` lines whenever the upstream
    # rolling SHA changes, so rpmspec returns the correct version.
    # spectool -g fetches all three Source* zips (check + cli + gui);
    # SRPM packs them all. We return the Check zip as the primary archive
    # because Packit only needs one stdout line to anchor the archive set.
    actions:
      create-archive:
        - bash -c "spectool -g mpf.spec 1>&2"
        - bash -c "ls -1 MPF.Check_net10.0_linux-x64_release.zip"

  discimagecreator:
    paths:
      - fedora/discimagecreator/
    specfile_path: discimagecreator.spec
    upstream_project_url: https://github.com/saramibreak/DiscImageCreator
    # Source-build (Phase 6 binary-repackage was reverted because the
    # upstream Linux binary links against EOL OpenSSL 1.1 — see
    # saramibreak/DiscImageCreator#321). spectool -g fetches all four
    # upstream source tarballs (DIC + EccEdc + DVDAuth + unscrambler);
    # SRPM packs them all. watch-dic-releases.yml polls daily and
    # rewrites %global dicver on tag bumps — Source0 URL is
    # deterministic from the tag, no body-parsing needed.
    actions:
      create-archive:
        - bash -c "spectool -g discimagecreator.spec 1>&2"
        - bash -c "ls -1 DiscImageCreator-*.tar.gz | head -1"

  aaru:
    paths:
      - fedora/aaru/
    specfile_path: aaru.spec
    upstream_project_url: https://github.com/aaru-dps/Aaru
    # Aaru is currently on v6 alpha pre-releases; we pin manually in
    # the spec (no watcher). spectool -g pulls both upstream tarballs
    # (prebuilt linux_amd64 binary + signed source) and the SRPM packs
    # them both.
    actions:
      create-archive:
        - bash -c "spectool -g aaru.spec 1>&2"
        - bash -c "ls -1 aaru-*-alpha.19_linux_amd64.tar.xz | head -1"

jobs:
  # Per-package commit jobs, each pinned to its OWN trigger branch
  # (build-<tool>). Two independent guarantees keep `dnf` clients from
  # ever hitting a checksum mismatch:
  #
  # 1. BRANCH-SCOPING — only the changed tool rebuilds.
  #    Packit has no working path-based job filter for trigger: commit
  #    (the package-level paths: field only scopes SRPM source
  #    extraction, NOT triggering — packit-service#2006 / PR #2780 still
  #    unmerged as of 2026-06). So triggers are isolated by BRANCH: a
  #    push to main builds nothing (no job watches main); each tool's
  #    watcher first pushes the canonical commit to main (builds
  #    nothing), then recreates its build-<tool> branch with a short,
  #    branch-specific landing README and force-pushes it (the README
  #    diff means build-<tool> is not a fast-forward of main; trigger
  #    refs are disposable so the force-push is harmless). That fires
  #    ONLY that tool's job. Manual single-tool build:
  #      git push origin main:build-<tool>
  #
  # 2. update_release: true — every build gets a UNIQUE Release.
  #    Packit appends a monotonic snapshot suffix (timestamp + commit) to
  #    the spec's Release at build time, so even a rebuild whose spec
  #    NEVRA is otherwise unchanged (e.g. a manual packaging tweak with
  #    no version bump) produces a distinct NEVRA. Without this a
  #    same-NEVRA rebuild republishes a new checksum and breaks dnf.
  #    Together with branch-scoping a same-NEVRA republish is impossible —
  #    by isolation AND by construction.
  #
  # All four tools have GitHub-hosted watchers that rewrite the spec on
  # upstream releases and commit — Packit then auto-builds the COPR
  # update from that commit. No `pull_from_upstream` jobs because none of
  # these tools are packaged in Fedora's official dist-git.
  - job: copr_build
    trigger: commit
    branch: build-redumper
    packages: [redumper]
    update_release: true
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  - job: copr_build
    trigger: commit
    branch: build-mpf
    packages: [mpf]
    update_release: true
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  # discimagecreator: spec-supplied tag-version (YYYYMMDD) is monotonic,
  # no auto-suffix needed.
  - job: copr_build
    trigger: commit
    branch: build-dic
    packages: [discimagecreator]
    update_release: true
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  # aaru: spec-supplied (6.0.0-0.alpha.19.1) is monotonic; on next
  # upstream alpha bump the Release segment goes up.
  - job: copr_build
    trigger: commit
    branch: build-aaru
    packages: [aaru]
    update_release: true
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  - job: copr_build
    trigger: pull_request
    packages: [redumper, mpf, discimagecreator, aaru]
    update_release: true
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64
