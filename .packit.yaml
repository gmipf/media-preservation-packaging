issue_repository: https://github.com/gmipf/packaging-media-preservation

srpm_build_deps:
  - rpm-build
  - rpmdevtools

# Multi-package layout — each tool gets its own block under packages:.
# When `paths:` is set, `specfile_path` and action-internal paths are
# relative to that path (Packit joins them: paths + specfile_path).
# create-archive overrides are needed because this repo holds only
# packaging recipes (no upstream source); default `git archive HEAD`
# would only archive the spec. We use spectool to fetch Source0 instead.
packages:
  redumper:
    paths:
      - fedora/redumper/
    specfile_path: redumper.spec
    upstream_project_url: https://github.com/superg/redumper
    upstream_tag_template: "b{version}"
    # Repackage of upstream prebuilt linux-x64 ZIP (since Phase 6).
    # spectool also fetches LICENSE + README via raw.githubusercontent.
    # create-archive returns the linux-x64.zip as the primary archive;
    # SRPM packs all three Source* URLs.
    actions:
      get-current-version:
        - bash -c "rpmspec -q --queryformat '%{version}\n' redumper.spec | head -1"
      create-archive:
        - bash -c "spectool -g redumper.spec 1>&2"
        - bash -c "ls -1 redumper-b*-linux-x64.zip | head -1"

  mpf:
    paths:
      - fedora/mpf/
    specfile_path: mpf.spec
    upstream_project_url: https://github.com/SabreTools/MPF
    # No get-current-version action — watch-mpf-rolling.yml rewrites the
    # `%global mpfver` and `%global mpfsnap` lines whenever the upstream
    # rolling SHA changes, so rpmspec returns the correct version.
    # spectool -g fetches all three Source* zips (check + cli + gui);
    # SRPM packs them all. We return the Check zip as the primary archive
    # because Packit only needs one stdout line to anchor the archive set.
    actions:
      create-archive:
        - bash -c "spectool -g mpf.spec 1>&2"
        - bash -c "ls -1 MPF.Check_net10.0_linux-x64_release.zip"

  discimagecreator:
    paths:
      - fedora/discimagecreator/
    specfile_path: discimagecreator.spec
    upstream_project_url: https://github.com/saramibreak/DiscImageCreator
    # Source-build (Phase 6 binary-repackage was reverted because the
    # upstream Linux binary links against EOL OpenSSL 1.1 — see
    # saramibreak/DiscImageCreator#321). spectool -g fetches all four
    # upstream source tarballs (DIC + EccEdc + DVDAuth + unscrambler);
    # SRPM packs them all. watch-dic-releases.yml polls daily and
    # rewrites %global dicver on tag bumps — Source0 URL is
    # deterministic from the tag, no body-parsing needed.
    actions:
      create-archive:
        - bash -c "spectool -g discimagecreator.spec 1>&2"
        - bash -c "ls -1 DiscImageCreator-*.tar.gz | head -1"

  aaru:
    paths:
      - fedora/aaru/
    specfile_path: aaru.spec
    upstream_project_url: https://github.com/aaru-dps/Aaru
    # Aaru is currently on v6 alpha pre-releases; we pin manually in
    # the spec (no watcher). spectool -g pulls both upstream tarballs
    # (prebuilt linux_amd64 binary + signed source) and the SRPM packs
    # them both.
    actions:
      create-archive:
        - bash -c "spectool -g aaru.spec 1>&2"
        - bash -c "ls -1 aaru-*-alpha.19_linux_amd64.tar.xz | head -1"

jobs:
  - job: pull_from_upstream
    trigger: release
    packages: [redumper]
    dist_git_branches:
      - fedora-43

  # Per-package commit jobs. The `paths:` filter (regex matched against
  # changed file paths from repo root) means each job only fires when
  # its tool's directory was touched — without it, every commit triggers
  # all four jobs even though only one spec was edited.
  # NOTE: edits to .packit.yaml itself (this file) live outside all four
  # path filters and therefore trigger ALL jobs; that's only a problem
  # at .packit.yaml-edit-time (rare).
  - job: copr_build
    trigger: commit
    branch: main
    packages: [redumper]
    paths: ["^fedora/redumper/"]
    update_release: false
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  - job: copr_build
    trigger: commit
    branch: main
    packages: [mpf]
    paths: ["^fedora/mpf/"]
    update_release: false
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  - job: copr_build
    trigger: commit
    branch: main
    packages: [discimagecreator]
    paths: ["^fedora/discimagecreator/"]
    update_release: false
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  - job: copr_build
    trigger: commit
    branch: main
    packages: [aaru]
    paths: ["^fedora/aaru/"]
    update_release: false
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  # PR-trigger keeps no paths filter — PRs that touch multiple tools
  # should validate all touched packages, which Packit handles via the
  # per-package paths: declaration up in packages:.
  - job: copr_build
    trigger: pull_request
    packages: [redumper, mpf, discimagecreator, aaru]
    update_release: false
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64
